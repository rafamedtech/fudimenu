name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      USE_MOCKS: "true"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      # prisma.config.ts calls env('DIRECT_URL') at load time even for `prisma generate`.
      # generate does not open a connection; a placeholder satisfies the resolver.
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test --run
      - run: pnpm build
