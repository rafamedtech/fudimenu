name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      USE_MOCKS: "true"
      SKIP_ENV_VALIDATION: "true"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      # prisma.config.ts calls env('DIRECT_URL') at load time even for `prisma generate`.
      # generate does not open a connection; a placeholder satisfies the resolver.
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      NEXT_PUBLIC_POSTHOG_KEY: "phc_ci_stub"
      NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm exec vitest run
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: checks
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fudimenu
          POSTGRES_PASSWORD: fudimenu
          POSTGRES_DB: fudimenu_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: "postgresql://fudimenu:fudimenu@localhost:5432/fudimenu_test?schema=public"
      DIRECT_URL: "postgresql://fudimenu:fudimenu@localhost:5432/fudimenu_test?schema=public"
      USE_MOCKS: "false"
      SKIP_ENV_VALIDATION: "true"
      E2E_TEST_AUTH: "true"
      E2E_STRIPE_CHECKOUT_MOCK: "true"
      NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3102"
      STRIPE_SECRET_KEY: "sk_test_e2e_mock"
      NEXT_PUBLIC_SUPABASE_URL: "http://localhost"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "anon-key-placeholder"
      CRON_SECRET: "ci-cron-secret"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
