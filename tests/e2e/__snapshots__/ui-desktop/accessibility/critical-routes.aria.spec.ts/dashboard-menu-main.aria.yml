- main:
  - paragraph: Navegación del restaurante
  - heading "Brasa Norte" [level=2]
  - paragraph: Cambia entre el perfil del restaurante y la captura del menú sin salir del dashboard.
  - navigation:
    - list:
      - listitem:
        - link "Todos tus restaurantes":
          - /url: /dashboard/restaurants
      - listitem:
        - link "Perfil":
          - /url: /dashboard/restaurants/restaurant-brasa
      - listitem:
        - link "Menú":
          - /url: /dashboard/restaurants/restaurant-brasa/menu
      - listitem:
        - link "Ver público":
          - /url: /r/brasa-norte
  - paragraph: Menú
  - heading "Brasa Norte" [level=1]
  - paragraph: Organiza categorías, agrega platillos y controla qué se ve en la página pública.
  - link "Volver al perfil":
    - /url: /dashboard/restaurants/restaurant-brasa
  - link "Ver público":
    - /url: /r/brasa-norte
  - paragraph: Categorías
  - heading "Ordena el menú por secciones" [level=2]
  - paragraph: Crea categorías activas para lo público y organiza el orden de lectura desde aquí.
  - text: 3 activas 0 ocultas
  - heading "Nueva categoría" [level=3]
  - text: Nombre *
  - textbox
  - text: Slug opcional
  - textbox
  - text: Orden
  - spinbutton: "4"
  - checkbox "Visible en el menú público Solo las categorías activas se muestran en el menú público." [checked]
  - text: Visible en el menú público Solo las categorías activas se muestran en el menú público.
  - button "Agregar categoría" [disabled]
  - article:
    - heading "Entradas" [level=3]
    - text: Orden 1 2 platillos Activa
    - paragraph: "Slug: entradas"
    - button "Editar"
    - button "Eliminar"
  - article:
    - heading "Tacos" [level=3]
    - text: Orden 2 3 platillos Activa
    - paragraph: "Slug: tacos"
    - button "Editar"
    - button "Eliminar"
  - article:
    - heading "Bebidas" [level=3]
    - text: Orden 3 2 platillos Activa
    - paragraph: "Slug: bebidas"
    - button "Editar"
    - button "Eliminar"
  - paragraph: Platillos
  - heading "Captura tu menú" [level=2]
  - paragraph: Usa categorías activas para ordenar el menú y marca disponibilidad sin borrar historial.
  - text: 6 disponibles 1 ocultos
  - heading "Nuevo platillo" [level=3]
  - text: Categoría *
  - combobox:
    - option "Entradas" [selected]
    - option "Tacos"
    - option "Bebidas"
  - text: Nombre *
  - textbox
  - text: Descripción
  - textbox
  - text: Precio *
  - spinbutton
  - text: Orden en la categoría
  - spinbutton: "3"
  - text: Imagen URL
  - textbox
  - checkbox "Disponible para mostrar en la página pública Los platillos no disponibles quedan guardados pero no se muestran al público." [checked]
  - text: Disponible para mostrar en la página pública Los platillos no disponibles quedan guardados pero no se muestran al público.
